apiVersion: apps/v1
kind: Deployment
metadata:
  name: sql-guard
  namespace: poc-mcp-trust-plane
  labels:
    app: sql-guard
    autopoc.io/project: mcp-trust-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sql-guard
  template:
    metadata:
      labels:
        app: sql-guard
    spec:
      containers:
        - name: sql-guard
          image: quay.io/aicatalyst/mcp-trust-plane-sql-guard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 6001
          env:
            - name: PORT
              value: "6001"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 6001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 6001
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
