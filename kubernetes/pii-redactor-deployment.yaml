apiVersion: apps/v1
kind: Deployment
metadata:
  name: pii-redactor
  namespace: poc-mcp-trust-plane
  labels:
    app: pii-redactor
    autopoc.io/project: mcp-trust-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pii-redactor
  template:
    metadata:
      labels:
        app: pii-redactor
    spec:
      imagePullSecrets:
        - name: quay-pull-secret
      containers:
        - name: pii-redactor
          image: quay.io/aicatalyst/mcp-trust-plane-pii-redactor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 6002
          env:
            - name: PORT
              value: "6002"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 6002
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 6002
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
