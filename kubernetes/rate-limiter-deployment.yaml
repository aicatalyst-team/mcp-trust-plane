apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate-limiter
  namespace: poc-mcp-trust-plane
  labels:
    app: rate-limiter
    autopoc.io/project: mcp-trust-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rate-limiter
  template:
    metadata:
      labels:
        app: rate-limiter
    spec:
      containers:
        - name: rate-limiter
          image: quay.io/aicatalyst/mcp-trust-plane-rate-limiter:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 6007
          env:
            - name: PORT
              value: "6007"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 6007
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 6007
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
