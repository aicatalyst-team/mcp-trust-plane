services:
  sql-guard:
    build: ./common/sql-guard
    image: mcp-filter-sql-guard:latest
    container_name: mcp-filter-sql-guard
    ports:
      - "6001:6001"
    environment:
      PORT: 6001
    restart: unless-stopped

  pii-redactor:
    build: ./common/pii-redactor
    image: mcp-filter-pii-redactor:latest
    container_name: mcp-filter-pii-redactor
